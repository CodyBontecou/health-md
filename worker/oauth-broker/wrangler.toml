name = "health-md-oauth-broker"
main = "src/index.ts"
compatibility_date = "2026-05-16"

[vars]
# Comma-separated redirect URI allowlist. Register this exact URI in each
# provider dashboard unless you switch to universal links later.
ALLOWED_REDIRECT_URIS = "healthmd://oauth/callback"

# Required mobile client gate. The Worker fails closed when it is absent. It is
# not a durable secret because mobile binaries can be inspected, but it prevents
# an accidentally public token-exchange service.
# wrangler secret put BROKER_CLIENT_TOKEN

# Provider credentials are secrets:
# wrangler secret put FITBIT_CLIENT_ID
# wrangler secret put FITBIT_CLIENT_SECRET
# wrangler secret put OURA_CLIENT_ID
# wrangler secret put OURA_CLIENT_SECRET
# wrangler secret put WHOOP_CLIENT_ID
# wrangler secret put WHOOP_CLIENT_SECRET
# wrangler secret put WITHINGS_CLIENT_ID
# wrangler secret put WITHINGS_CLIENT_SECRET
# wrangler secret put STRAVA_CLIENT_ID
# wrangler secret put STRAVA_CLIENT_SECRET
