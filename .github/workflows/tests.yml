name: Run Tests

on:
  push:
    branches:
      - main
      - testing
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Select iOS Simulator
        id: simulator
        shell: bash
        run: |
          set -euo pipefail

          IOS_DEVICE=$(
            xcrun simctl list devices available iOS \
              | grep -E "iPhone (16 Pro|16|15 Pro|15)" \
              | head -n 1 \
              | sed -E 's/^[[:space:]]*([^()]*) .*/\1/' \
              | xargs
          )

          if [[ -z "${IOS_DEVICE}" ]]; then
            IOS_DEVICE=$(
              xcrun simctl list devices available iOS \
                | grep -E "iPhone" \
                | head -n 1 \
                | sed -E 's/^[[:space:]]*([^()]*) .*/\1/' \
                | xargs
            )
          fi

          if [[ -z "${IOS_DEVICE}" ]]; then
            echo "::error::No available iOS Simulator device found"
            exit 1
          fi

          echo "Using simulator: ${IOS_DEVICE}"
          echo "ios_destination=platform=iOS Simulator,name=${IOS_DEVICE}" >> "$GITHUB_OUTPUT"

      - name: Run test suite (iOS + macOS)
        run: make test IOS_SIM='${{ steps.simulator.outputs.ios_destination }}'
