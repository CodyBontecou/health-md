# Build and submit Health.md macOS to App Store Connect.
#
# Triggers:
#   - publishing a GitHub Release with a v* tag (full submission)
#   - workflow_dispatch (manual testing with dry_run / skip_asc_submit)
#
# Effects on release publish:
#   1. Build, sign, notarize Developer ID + App Store builds
#   2. Upload the App Store pkg to ASC and submit for review (MAC_OS platform)
#   3. Attach the Developer ID zip to the GitHub release
#
# What this workflow does NOT do (moved to announce.yml, fired by ASC webhook on approval):
#   - Publish to isolated.tech
#   - Post to Discord
#
# Bot-authored release publishes are skipped so announce.yml can publish legacy draft releases
# without redeploying the same build to ASC.
#
# Secrets required:
#   Signing:       APPLE_CERTIFICATE_P12 (combined identities), APPLE_CERTIFICATE_PASSWORD,
#                  MAC_APP_STORE_PROVISIONING_PROFILE, APPLE_TEAM_ID
#   Notarization:  APPLE_ID, APPLE_ID_PASSWORD
#   App Store:     ASC_KEY_ID, ASC_ISSUER_ID, ASC_API_KEY_P8, HEALTHMD_ASC_APP_ID

name: Release macOS

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Existing v* release tag to build from main (for reruns after workflow-only fixes)'
        required: false
        default: ''
        type: string
      dry_run:
        description: 'Dry run (build but do not publish anywhere)'
        required: false
        default: false
        type: boolean
      skip_asc_upload:
        description: 'Build and attach the macOS zip, but skip ASC pkg upload and review submission'
        required: false
        default: false
        type: boolean
      skip_asc_submit:
        description: 'Upload to ASC but do not submit for review'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.release.tag_name || github.ref }}
  cancel-in-progress: false

env:
  XCODE_SCHEME: HealthMd-macOS
  APP_NAME: Health.md
  BUNDLE_ID: com.codybontecou.obsidianhealth
  ASC_APP_ID: ${{ secrets.HEALTHMD_ASC_APP_ID }}

jobs:
  release:
    name: Build & Release
    if: ${{ github.event_name != 'release' || github.event.release.author.login != 'github-actions[bot]' }}
    runs-on: self-hosted
    timeout-minutes: 45

    steps:
      - name: Configure Git defaults
        run: git config --global init.defaultBranch main

      - name: Determine release metadata
        id: meta
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            TAG="${{ github.event.release.tag_name }}"
            if [[ "$TAG" != v* ]]; then
              echo "::error::Release tag must start with 'v' (for example v1.2.3); got '$TAG'"
              exit 1
            fi
            VERSION="${TAG#v}"
            MODE="tag"
            TRIGGER="release"
          elif [[ -n "${{ github.event.inputs.release_tag || '' }}" ]]; then
            TAG="${{ github.event.inputs.release_tag }}"
            if [[ "$TAG" != v* ]]; then
              echo "::error::Manual release tag must start with 'v' (for example v1.2.3); got '$TAG'"
              exit 1
            fi
            VERSION="${TAG#v}"
            MODE="tag"
            TRIGGER="manual-release"
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF_NAME}"
            VERSION="${TAG#v}"
            MODE="tag"
            TRIGGER="tag"
          else
            # Branch dispatch (testing only — must be dry run or skip_asc_submit)
            MODE="branch"
            TAG=""
            VERSION=""
            TRIGGER="manual"
          fi
          {
            echo "mode=$MODE"
            echo "tag=$TAG"
            echo "version=$VERSION"
            echo "trigger=$TRIGGER"
          } >> "$GITHUB_OUTPUT"
          echo "Running in $MODE mode via $TRIGGER (tag=$TAG)"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Verify asc CLI
        run: |
          asc --version || { echo "::error::asc CLI not found on runner"; exit 1; }

      - name: Remove iOS-only Swift packages from macOS release workspace
        run: |
          # The macOS target does not link AppsFlyer or Notelet, but Xcode resolves
          # every project-level Swift package before even showing build settings.
          # AppsFlyer's repository is large enough to make macOS-only releases
          # fragile on the self-hosted runner, so remove these iOS-only package
          # references from this checked-out workspace only.
          python3 - <<'PY'
          from pathlib import Path
          import re

          path = Path("HealthMd.xcodeproj/project.pbxproj")
          ids = {
              "6269B67A2F43C8D50067D253",  # AppsFlyerFramework package
              "6269B67B2F43C8D50067D253",  # AppsFlyerLib product
              "6269B67C2F43C8D50067D253",  # AppsFlyerLib build file
              "62D100002F60B00000A10000",  # notelet package
              "62D100012F60B00000A10000",  # Notelet product
              "62D100022F60B00000A10000",  # Notelet build file
          }
          output = []
          skip_depth = 0
          for line in path.read_text().splitlines(keepends=True):
              if skip_depth > 0:
                  skip_depth += line.count("{") - line.count("}")
                  continue
              stripped = line.lstrip()
              object_id = stripped.split(" ", 1)[0] if stripped else ""
              if object_id in ids and " = {" in line:
                  skip_depth = line.count("{") - line.count("}")
                  continue
              if object_id in ids and stripped.endswith(",\n"):
                  continue
              output.append(line)
          path.write_text("".join(output))
          PY

      - name: Resolve version from project
        id: version
        run: |
          # pbxproj is the source of truth (commit 6f719cd7). Parse it directly
          # so version resolution cannot be blocked by Swift package networking.
          ACTUAL=$(awk -F'= ' '/MARKETING_VERSION = / { gsub(/;/, "", $2); print $2; exit }' HealthMd.xcodeproj/project.pbxproj)
          BUILD=$(awk -F'= ' '/CURRENT_PROJECT_VERSION = / { gsub(/;/, "", $2); print $2; exit }' HealthMd.xcodeproj/project.pbxproj)

          if [[ -z "$ACTUAL" || -z "$BUILD" ]]; then
            echo "::error::Failed to resolve MARKETING_VERSION or CURRENT_PROJECT_VERSION from HealthMd.xcodeproj/project.pbxproj"
            exit 1
          fi

          if [[ "${{ steps.meta.outputs.mode }}" == "tag" ]]; then
            EXPECTED="${{ steps.meta.outputs.version }}"
            if [[ "$EXPECTED" != "$ACTUAL" ]]; then
              echo "::error::Tag v$EXPECTED does not match resolved MARKETING_VERSION $ACTUAL. Bump pbxproj MARKETING_VERSION, commit, then re-tag."
              exit 1
            fi
          else
            if [[ "${{ github.event.inputs.dry_run }}" != "true" ]]; then
              echo "::error::Branch dispatch requires dry_run=true (only GitHub Release publishes upload to ASC)"
              exit 1
            fi
          fi

          echo "marketing_version=$ACTUAL" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD" >> "$GITHUB_OUTPUT"
          echo "Version $ACTUAL, build $BUILD"

      - name: Import signing certificates
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > "$CERT_PATH"

          security import "$CERT_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          EXISTING_KEYCHAINS=()
          while IFS= read -r keychain; do
            [[ -n "$keychain" ]] && EXISTING_KEYCHAINS+=("$keychain")
          done < <(security list-keychains -d user | tr -d '"' | sed 's/^[[:space:]]*//')
          security list-keychains -d user -s "$KEYCHAIN_PATH" "${EXISTING_KEYCHAINS[@]}"
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign:,productsign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          rm "$CERT_PATH"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Install Mac App Store provisioning profile
        env:
          MAC_APP_STORE_PROVISIONING_PROFILE: ${{ secrets.MAC_APP_STORE_PROVISIONING_PROFILE }}
        run: |
          PROFILE_PATH="$RUNNER_TEMP/HealthMD-MacAppStore.provisionprofile"
          echo "$MAC_APP_STORE_PROVISIONING_PROFILE" | base64 --decode > "$PROFILE_PATH"

          PROFILE_PLIST="$RUNNER_TEMP/profile-content.plist"
          security cms -D -i "$PROFILE_PATH" > "$PROFILE_PLIST"
          UUID=$(/usr/libexec/PlistBuddy -c 'Print :UUID' "$PROFILE_PLIST")

          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_DIR"
          cp "$PROFILE_PATH" "$PROFILE_DIR/$UUID.provisionprofile"

          echo "PROVISION_PROFILE_PATH=$PROFILE_PATH" >> "$GITHUB_ENV"
          echo "Installed Mac App Store profile $UUID"

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -scheme "$XCODE_SCHEME" \
            -clonedSourcePackagesDirPath "$RUNNER_TEMP/SourcePackages"

      - name: Archive (signed with Developer ID)
        run: |
          ARCHIVE_PATH="$RUNNER_TEMP/$APP_NAME.xcarchive"
          xcodebuild archive \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath "$ARCHIVE_PATH" \
            -clonedSourcePackagesDirPath "$RUNNER_TEMP/SourcePackages" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            OTHER_CODE_SIGN_FLAGS="--timestamp --options=runtime"
          echo "ARCHIVE_PATH=$ARCHIVE_PATH" >> "$GITHUB_ENV"

      - name: Export Developer ID build
        run: |
          cat > "$RUNNER_TEMP/ExportOptions-DeveloperID.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>developer-id</string>
            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>Developer ID Application</string>
          </dict>
          </plist>
          EOF

          EXPORT_PATH="$RUNNER_TEMP/Export-DeveloperID"
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions-DeveloperID.plist" \
            -exportPath "$EXPORT_PATH"
          echo "DEVID_EXPORT_PATH=$EXPORT_PATH" >> "$GITHUB_ENV"

      - name: Notarize and staple
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          APP_PATH="$DEVID_EXPORT_PATH/$APP_NAME.app"
          ZIP_PATH="$RUNNER_TEMP/notarize.zip"
          ditto -c -k --keepParent "$APP_PATH" "$ZIP_PATH"
          xcrun notarytool submit "$ZIP_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "$APP_PATH"

      - name: Create release zip (Developer ID)
        id: zip
        run: |
          APP_PATH="$DEVID_EXPORT_PATH/$APP_NAME.app"
          ZIP_NAME="$APP_NAME-v${{ steps.version.outputs.marketing_version }}.zip"
          ZIP_PATH="$RUNNER_TEMP/$ZIP_NAME"
          ditto -c -k --keepParent "$APP_PATH" "$ZIP_PATH"
          echo "zip_path=$ZIP_PATH" >> "$GITHUB_OUTPUT"
          echo "zip_name=$ZIP_NAME" >> "$GITHUB_OUTPUT"

      - name: Build App Store pkg
        id: pkg
        run: |
          APPSTORE_DIR="$RUNNER_TEMP/appstore-build"
          mkdir -p "$APPSTORE_DIR"
          cp -R "$ARCHIVE_PATH/Products/Applications/$APP_NAME.app" "$APPSTORE_DIR/"
          APP_PATH="$APPSTORE_DIR/$APP_NAME.app"

          cp "$PROVISION_PROFILE_PATH" "$APP_PATH/Contents/embedded.provisionprofile"

          cat > "$RUNNER_TEMP/appstore-entitlements.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>com.apple.application-identifier</key>
            <string>${{ secrets.APPLE_TEAM_ID }}.${{ env.BUNDLE_ID }}</string>
            <key>com.apple.developer.team-identifier</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
            <key>com.apple.security.app-sandbox</key>
            <true/>
            <key>com.apple.security.files.user-selected.read-write</key>
            <true/>
            <key>com.apple.security.files.bookmarks.app-scope</key>
            <true/>
            <key>com.apple.security.network.client</key>
            <true/>
            <key>com.apple.security.network.server</key>
            <true/>
          </dict>
          </plist>
          EOF

          codesign --force --deep \
            --sign "Apple Distribution: Cody Russell Bontecou (${{ secrets.APPLE_TEAM_ID }})" \
            --entitlements "$RUNNER_TEMP/appstore-entitlements.plist" \
            --options runtime \
            --timestamp \
            "$APP_PATH"

          PKG_PATH="$RUNNER_TEMP/HealthMd-${{ steps.version.outputs.marketing_version }}-appstore.pkg"
          productbuild --component "$APP_PATH" /Applications \
            --sign "3rd Party Mac Developer Installer: Cody Russell Bontecou (${{ secrets.APPLE_TEAM_ID }})" \
            "$PKG_PATH"

          echo "pkg_path=$PKG_PATH" >> "$GITHUB_OUTPUT"

      - name: Prepare release notes
        id: notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NOTES_FILE="$RUNNER_TEMP/release-notes.md"
          ASC_NOTES_FILE="$RUNNER_TEMP/asc-notes.txt"

          if [[ "${{ github.event_name }}" == "release" ]]; then
            TAG="${{ steps.meta.outputs.tag }}"
            NOTES=$(jq -r '.release.body // ""' "$GITHUB_EVENT_PATH")

            if [[ -z "$NOTES" ]]; then
              PREV_TAG=$(git tag --sort=-creatordate | grep '^v' | grep -v "^${TAG}$" | head -1)
              echo "Release body is empty; generating notes from ${PREV_TAG:-first release}"

              if [[ -n "$PREV_TAG" ]]; then
                NOTES=$(gh api -X POST "repos/${{ github.repository }}/releases/generate-notes" \
                  -f tag_name="$TAG" \
                  -f previous_tag_name="$PREV_TAG" \
                  --jq .body)
              else
                NOTES=$(gh api -X POST "repos/${{ github.repository }}/releases/generate-notes" \
                  -f tag_name="$TAG" \
                  --jq .body)
              fi
            fi
          elif [[ "${{ steps.meta.outputs.mode }}" == "tag" ]]; then
            TAG="${{ steps.meta.outputs.tag }}"
            PREV_TAG=$(git tag --sort=-creatordate | grep '^v' | grep -v "^${TAG}$" | head -1)
            echo "Previous tag: ${PREV_TAG:-none}"

            if [[ -n "$PREV_TAG" ]]; then
              NOTES=$(gh api -X POST "repos/${{ github.repository }}/releases/generate-notes" \
                -f tag_name="$TAG" \
                -f previous_tag_name="$PREV_TAG" \
                --jq .body)
            else
              NOTES=$(gh api -X POST "repos/${{ github.repository }}/releases/generate-notes" \
                -f tag_name="$TAG" \
                --jq .body)
            fi
          else
            NOTES="[dry-run] Release notes are only generated on release/tag builds."
          fi

          if [[ -z "$NOTES" ]]; then
            NOTES="Bug fixes and improvements."
          fi

          printf '%s\n' "$NOTES" > "$NOTES_FILE"
          echo "notes_file=$NOTES_FILE" >> "$GITHUB_OUTPUT"

          ASC_NOTES=$(printf '%s\n' "$NOTES" | head -c 3900)
          printf '%s' "$ASC_NOTES" > "$ASC_NOTES_FILE"
          echo "asc_notes_file=$ASC_NOTES_FILE" >> "$GITHUB_OUTPUT"

          echo "--- Release notes ---"
          cat "$NOTES_FILE"

      - name: Configure asc CLI
        env:
          ASC_KEY_ID_SECRET: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID_SECRET: ${{ secrets.ASC_ISSUER_ID }}
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
        run: |
          ASC_KEY_DIR="$RUNNER_TEMP/.asc-keys"
          mkdir -p "$ASC_KEY_DIR"
          chmod 700 "$ASC_KEY_DIR"
          ASC_KEY_PATH="$ASC_KEY_DIR/AuthKey_${ASC_KEY_ID_SECRET}.p8"
          echo "$ASC_API_KEY_P8" | base64 --decode > "$ASC_KEY_PATH"
          chmod 600 "$ASC_KEY_PATH"
          {
            echo "ASC_KEY_ID=$ASC_KEY_ID_SECRET"
            echo "ASC_ISSUER_ID=$ASC_ISSUER_ID_SECRET"
            echo "ASC_PRIVATE_KEY_PATH=$ASC_KEY_PATH"
            echo "ASC_BYPASS_KEYCHAIN=1"
          } >> "$GITHUB_ENV"

      - name: Upload pkg to App Store Connect
        id: asc_upload
        if: ${{ github.event.inputs.dry_run != 'true' && github.event.inputs.skip_asc_upload != 'true' }}
        run: |
          UPLOAD_JSON=$(asc builds upload \
            --app "$ASC_APP_ID" \
            --pkg "${{ steps.pkg.outputs.pkg_path }}" \
            --version "${{ steps.version.outputs.marketing_version }}" \
            --build-number "${{ steps.version.outputs.build_number }}" \
            --wait \
            --poll-interval 30s)
          echo "$UPLOAD_JSON"
          BUILD_ID=$(printf '%s' "$UPLOAD_JSON" | python3 -c 'import sys, json; print(json.loads(sys.stdin.read().splitlines()[-1])["uploadId"])')
          echo "build_id=$BUILD_ID" >> "$GITHUB_OUTPUT"
          asc builds update --build-id "$BUILD_ID" --uses-non-exempt-encryption=false

      - name: Create ASC version and submit for review
        if: ${{ github.event.inputs.dry_run != 'true' && github.event.inputs.skip_asc_upload != 'true' && github.event.inputs.skip_asc_submit != 'true' }}
        run: |
          VERSION_INFO=$(asc versions list --app "$ASC_APP_ID" --platform MAC_OS --limit 10 --output json \
            | python3 -c '
          import sys, json
          data = json.load(sys.stdin)
          items = data.get("data", data) if isinstance(data, dict) else data
          target = "${{ steps.version.outputs.marketing_version }}"
          target_id = ""
          prev = ""
          for v in items:
              attrs = v.get("attributes", {})
              vs = attrs.get("versionString")
              if vs == target:
                  target_id = v.get("id", "")
              elif vs and not prev:
                  prev = vs
          print(target_id)
          print(prev)
          ')
          VERSION_ID=$(printf '%s\n' "$VERSION_INFO" | sed -n '1p')
          PREV_VERSION=$(printf '%s\n' "$VERSION_INFO" | sed -n '2p')

          if [[ -z "$VERSION_ID" ]]; then
            if [[ -z "$PREV_VERSION" ]]; then
              echo "::error::Could not determine previous macOS version to copy metadata from"
              exit 1
            fi
            echo "Copying metadata from previous version $PREV_VERSION"
            VERSION_JSON=$(asc versions create \
              --app "$ASC_APP_ID" \
              --version "${{ steps.version.outputs.marketing_version }}" \
              --platform MAC_OS \
              --copy-metadata-from "$PREV_VERSION" \
              --copy-fields "description,keywords,marketingUrl,promotionalText,supportUrl")
            VERSION_ID=$(printf '%s' "$VERSION_JSON" | python3 -c 'import sys, json; print(json.load(sys.stdin)["id"])')
            echo "Created version $VERSION_ID"
          else
            echo "Reusing existing macOS version $VERSION_ID"
          fi

          asc versions attach-build \
            --version-id "$VERSION_ID" \
            --build "${{ steps.asc_upload.outputs.build_id }}"

          WHATS_NEW=$(cat "${{ steps.notes.outputs.asc_notes_file }}")
          LOCALES=$(asc localizations list --version "$VERSION_ID" --output json \
            | python3 -c '
          import sys, json
          data = json.load(sys.stdin)
          items = data.get("data", data) if isinstance(data, dict) else data
          for item in items:
              locale = item.get("attributes", {}).get("locale")
              if locale:
                  print(locale)
          ')
          if [[ -z "$LOCALES" ]]; then
            LOCALES="en-US"
          fi
          while IFS= read -r LOCALE; do
            [[ -z "$LOCALE" ]] && continue
            echo "Updating What's New for $LOCALE"
            asc localizations update \
              --locale "$LOCALE" \
              --version "$VERSION_ID" \
              --whats-new "$WHATS_NEW"
          done <<< "$LOCALES"

          asc validate \
            --app "$ASC_APP_ID" \
            --version-id "$VERSION_ID" \
            --platform MAC_OS \
            --output table

          SUBMISSION_JSON=$(asc review submissions-create \
            --app "$ASC_APP_ID" \
            --platform MAC_OS)
          SUBMISSION_ID=$(printf '%s' "$SUBMISSION_JSON" | python3 -c 'import sys, json; print(json.load(sys.stdin)["data"]["id"])')
          echo "Created review submission $SUBMISSION_ID"

          asc review items-add \
            --submission "$SUBMISSION_ID" \
            --item-type appStoreVersions \
            --item-id "$VERSION_ID"

          asc review submissions-submit \
            --id "$SUBMISSION_ID" \
            --confirm

      - name: Attach macOS zip to GitHub release
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          ZIP_PATH="${{ steps.zip.outputs.zip_path }}"
          NOTES_FILE="${{ steps.notes.outputs.notes_file }}"

          if gh release view "$TAG" &>/dev/null; then
            # Release-triggered runs already have a published release. If a legacy
            # draft release exists, keep it draft; never demote a published release.
            IS_DRAFT=$(gh release view "$TAG" --json isDraft --jq .isDraft)
            if [[ "$IS_DRAFT" == "true" ]]; then
              echo "Updating existing draft $TAG with notes + macOS zip"
              gh release edit "$TAG" --notes-file "$NOTES_FILE"
            else
              echo "Release $TAG is already published; uploading macOS zip without changing notes"
            fi
            gh release upload "$TAG" "$ZIP_PATH" --clobber
          else
            echo "Creating draft release $TAG with macOS zip (fallback path)"
            gh release create "$TAG" \
              --draft \
              --title "$TAG" \
              --notes-file "$NOTES_FILE" \
              "$ZIP_PATH"
          fi

      - name: Cleanup keychain
        if: always()
        run: |
          if [[ -n "$KEYCHAIN_PATH" ]]; then
            security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          fi

      - name: Summary
        if: always()
        run: |
          {
            echo "## Submit macOS ${{ steps.meta.outputs.tag }}"
            echo ""
            echo "- **Version:** ${{ steps.version.outputs.marketing_version }} (build ${{ steps.version.outputs.build_number }})"
            echo "- **Trigger:** ${{ steps.meta.outputs.trigger }}"
            echo "- **Dry run:** ${{ github.event.inputs.dry_run || 'false' }}"
            echo "- **Skip ASC upload:** ${{ github.event.inputs.skip_asc_upload || 'false' }}"
            echo "- **Skip ASC submit:** ${{ github.event.inputs.skip_asc_submit || 'false' }}"
            echo ""
            echo "### Next steps"
            echo "Once ASC review approves the macOS submission, the ASC webhook will fire announce.yml,"
            echo "which publishes to isolated.tech and posts to Discord (and promotes a draft only for legacy tag-push runs)."
            echo ""
            echo "### Links"
            echo "- [App Store Connect](https://appstoreconnect.apple.com/apps/$ASC_APP_ID/appstore)"
            echo "- [GitHub Release](https://github.com/${{ github.repository }}/releases/tag/${{ steps.meta.outputs.tag }})"
          } >> "$GITHUB_STEP_SUMMARY"
