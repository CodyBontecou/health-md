# Release to isolated.tech when a GitHub release is published
#
# Required secrets (see README.md):
#   ISOLATED_API_KEY, SPARKLE_ED_PRIVATE_KEY, APPLE_CERTIFICATE_P12,
#   APPLE_CERTIFICATE_PASSWORD, APPLE_ID, APPLE_ID_PASSWORD, APPLE_TEAM_ID

name: Release macOS

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (build but do not publish)'
        required: false
        default: false
        type: boolean

jobs:
  release:
    uses: CodyBontecou/isolated-tech-website/.github/workflows/release-macos.yml@main
    with:
      xcode-scheme: HealthMd-macOS
      app-name: Health.md
      isolated-slug: healthmd
      dry-run: ${{ inputs.dry_run || false }}
    secrets: inherit

