# Build and submit Health.md iOS to App Store Connect.
#
# Triggers:
#   - publishing a GitHub Release with a v* tag (full submission)
#   - workflow_dispatch (manual testing with dry_run / skip_asc_submit)
#
# Effects on release publish:
#   1. Build, sign, and export iOS App Store .ipa
#   2. Upload the .ipa to ASC and submit for review (IOS platform)
#   3. Reuse the GitHub release as the release record (no iOS asset attached — .ipa is not user-facing)
#
# What this workflow does NOT do (moved to announce.yml, fired by ASC webhook on approval):
#   - Post to Discord
# (isolated.tech is macOS-only — iOS distribution is App Store only.)
#
# Bot-authored release publishes are skipped so announce.yml can publish legacy draft releases
# without redeploying the same build to ASC.
#
# Secrets required:
#   Signing:       APPLE_CERTIFICATE_P12 (combined identities), APPLE_CERTIFICATE_PASSWORD,
#                  APPLE_TEAM_ID
#   Provisioning:  ASC_KEY_ID, ASC_ISSUER_ID, ASC_API_KEY_P8 (used by Xcode automatic signing)
#   App Store:     HEALTHMD_ASC_APP_ID

name: Release iOS

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Existing v* release tag to submit from main (for reruns after workflow-only fixes)'
        required: false
        default: ''
        type: string
      dry_run:
        description: 'Dry run (build but do not publish anywhere)'
        required: false
        default: false
        type: boolean
      skip_asc_submit:
        description: 'Upload to ASC but do not submit for review'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.release.tag_name || github.ref }}
  cancel-in-progress: false

env:
  XCODE_SCHEME: HealthMd
  APP_NAME: Health.md
  BUNDLE_ID: com.codybontecou.obsidianhealth
  ASC_APP_ID: ${{ secrets.HEALTHMD_ASC_APP_ID }}

jobs:
  release:
    name: Build & Submit iOS
    if: ${{ github.event_name != 'release' || github.event.release.author.login != 'github-actions[bot]' }}
    runs-on: self-hosted
    timeout-minutes: 45

    steps:
      - name: Configure Git defaults
        run: git config --global init.defaultBranch main

      - name: Determine release metadata
        id: meta
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            TAG="${{ github.event.release.tag_name }}"
            if [[ "$TAG" != v* ]]; then
              echo "::error::Release tag must start with 'v' (for example v1.2.3); got '$TAG'"
              exit 1
            fi
            VERSION="${TAG#v}"
            MODE="tag"
            TRIGGER="release"
          elif [[ -n "${{ github.event.inputs.release_tag || '' }}" ]]; then
            TAG="${{ github.event.inputs.release_tag }}"
            if [[ "$TAG" != v* ]]; then
              echo "::error::Manual release tag must start with 'v' (for example v1.2.3); got '$TAG'"
              exit 1
            fi
            VERSION="${TAG#v}"
            MODE="tag"
            TRIGGER="manual-release"
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF_NAME}"
            VERSION="${TAG#v}"
            MODE="tag"
            TRIGGER="tag"
          else
            MODE="branch"
            TAG=""
            VERSION=""
            TRIGGER="manual"
          fi
          {
            echo "mode=$MODE"
            echo "tag=$TAG"
            echo "version=$VERSION"
            echo "trigger=$TRIGGER"
          } >> "$GITHUB_OUTPUT"
          echo "Running in $MODE mode via $TRIGGER (tag=$TAG)"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Verify asc CLI
        run: |
          asc --version || { echo "::error::asc CLI not found on runner"; exit 1; }

      - name: Configure App Store Connect API key
        env:
          ASC_KEY_ID_SECRET: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID_SECRET: ${{ secrets.ASC_ISSUER_ID }}
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
        run: |
          ASC_KEY_DIR="$RUNNER_TEMP/.asc-keys"
          mkdir -p "$ASC_KEY_DIR"
          chmod 700 "$ASC_KEY_DIR"
          ASC_KEY_PATH="$ASC_KEY_DIR/AuthKey_${ASC_KEY_ID_SECRET}.p8"
          echo "$ASC_API_KEY_P8" | base64 --decode > "$ASC_KEY_PATH"
          chmod 600 "$ASC_KEY_PATH"
          {
            echo "ASC_KEY_ID=$ASC_KEY_ID_SECRET"
            echo "ASC_ISSUER_ID=$ASC_ISSUER_ID_SECRET"
            echo "ASC_PRIVATE_KEY_PATH=$ASC_KEY_PATH"
            echo "ASC_BYPASS_KEYCHAIN=1"
          } >> "$GITHUB_ENV"

      - name: Resolve version from project
        id: version
        run: |
          # pbxproj is the source of truth; the iOS scheme shares MARKETING_VERSION/CURRENT_PROJECT_VERSION
          # with the macOS scheme so iOS+macOS ship in lockstep on the same tag.
          SETTINGS=$(xcodebuild -project HealthMd.xcodeproj -scheme "$XCODE_SCHEME" -configuration Release -showBuildSettings -destination 'generic/platform=iOS' 2>/dev/null)
          ACTUAL=$(printf '%s\n' "$SETTINGS" | awk '/^[[:space:]]*MARKETING_VERSION = / {print $NF; exit}')
          BUILD=$(printf '%s\n' "$SETTINGS" | awk '/^[[:space:]]*CURRENT_PROJECT_VERSION = / {print $NF; exit}')

          if [[ -z "$ACTUAL" || -z "$BUILD" ]]; then
            echo "::error::Failed to resolve MARKETING_VERSION or CURRENT_PROJECT_VERSION from xcodebuild settings"
            exit 1
          fi

          if [[ "${{ steps.meta.outputs.mode }}" == "tag" ]]; then
            EXPECTED="${{ steps.meta.outputs.version }}"
            if [[ "$EXPECTED" != "$ACTUAL" ]]; then
              echo "::error::Tag v$EXPECTED does not match resolved MARKETING_VERSION $ACTUAL. Bump pbxproj MARKETING_VERSION, commit, then re-tag."
              exit 1
            fi
          else
            if [[ "${{ github.event.inputs.dry_run }}" != "true" ]]; then
              echo "::error::Branch dispatch requires dry_run=true (only GitHub Release publishes upload to ASC)"
              exit 1
            fi
          fi

          echo "marketing_version=$ACTUAL" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD" >> "$GITHUB_OUTPUT"
          echo "Version $ACTUAL, build $BUILD"

      - name: Run APNs scheduling preflight
        run: scripts/check-apns-scheduling-preflight.sh

      - name: Import signing certificates
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > "$CERT_PATH"

          security import "$CERT_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          EXISTING_KEYCHAINS=()
          while IFS= read -r keychain; do
            [[ -n "$keychain" ]] && EXISTING_KEYCHAINS+=("$keychain")
          done < <(security list-keychains -d user | tr -d '"' | sed 's/^[[:space:]]*//')
          security list-keychains -d user -s "$KEYCHAIN_PATH" "${EXISTING_KEYCHAINS[@]}"
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign:,productsign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          rm "$CERT_PATH"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Prepare automatic provisioning
        run: |
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_DIR"
          echo "Using Xcode automatic signing with the App Store Connect API key for the app, widgets, and watch targets."

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -scheme "$XCODE_SCHEME" \
            -clonedSourcePackagesDirPath "$RUNNER_TEMP/SourcePackages"

      - name: Archive iOS (automatic signing)
        run: |
          ARCHIVE_PATH="$RUNNER_TEMP/$APP_NAME-iOS.xcarchive"
          xcodebuild archive \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$ARCHIVE_PATH" \
            -clonedSourcePackagesDirPath "$RUNNER_TEMP/SourcePackages" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$ASC_PRIVATE_KEY_PATH" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}"
          echo "ARCHIVE_PATH=$ARCHIVE_PATH" >> "$GITHUB_ENV"

      - name: Export iOS .ipa (App Store)
        id: ipa
        run: |
          cat > "$RUNNER_TEMP/ExportOptions-iOS-AppStore.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

          EXPORT_PATH="$RUNNER_TEMP/Export-iOS"
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions-iOS-AppStore.plist" \
            -exportPath "$EXPORT_PATH" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$ASC_PRIVATE_KEY_PATH" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"

          IPA_PATH=$(find "$EXPORT_PATH" -maxdepth 1 -name '*.ipa' | head -1)
          if [[ -z "$IPA_PATH" ]]; then
            echo "::error::No .ipa produced by exportArchive"
            exit 1
          fi
          echo "ipa_path=$IPA_PATH" >> "$GITHUB_OUTPUT"

      - name: Prepare release notes
        id: notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NOTES_FILE="$RUNNER_TEMP/release-notes.md"
          ASC_NOTES_FILE="$RUNNER_TEMP/asc-notes.txt"

          if [[ "${{ github.event_name }}" == "release" ]]; then
            TAG="${{ steps.meta.outputs.tag }}"
            NOTES=$(jq -r '.release.body // ""' "$GITHUB_EVENT_PATH")

            if [[ -z "$NOTES" ]]; then
              PREV_TAG=$(git tag --sort=-creatordate | grep '^v' | grep -v "^${TAG}$" | head -1)
              echo "Release body is empty; generating notes from ${PREV_TAG:-first release}"

              if [[ -n "$PREV_TAG" ]]; then
                NOTES=$(gh api -X POST "repos/${{ github.repository }}/releases/generate-notes" \
                  -f tag_name="$TAG" \
                  -f previous_tag_name="$PREV_TAG" \
                  --jq .body)
              else
                NOTES=$(gh api -X POST "repos/${{ github.repository }}/releases/generate-notes" \
                  -f tag_name="$TAG" \
                  --jq .body)
              fi
            fi
          elif [[ "${{ steps.meta.outputs.mode }}" == "tag" ]]; then
            TAG="${{ steps.meta.outputs.tag }}"
            NOTES=$(gh release view "$TAG" --json body --jq '.body // ""' 2>/dev/null || true)

            if [[ -z "$NOTES" ]]; then
              PREV_TAG=$(git tag --sort=-creatordate | grep '^v' | grep -v "^${TAG}$" | head -1)
              echo "Release body is empty or unavailable; generating notes from ${PREV_TAG:-first release}"

              if [[ -n "$PREV_TAG" ]]; then
                NOTES=$(gh api -X POST "repos/${{ github.repository }}/releases/generate-notes" \
                  -f tag_name="$TAG" \
                  -f previous_tag_name="$PREV_TAG" \
                  --jq .body)
              else
                NOTES=$(gh api -X POST "repos/${{ github.repository }}/releases/generate-notes" \
                  -f tag_name="$TAG" \
                  --jq .body)
              fi
            fi
          else
            NOTES="[dry-run] Release notes are only generated on release/tag builds."
          fi

          if [[ -z "$NOTES" ]]; then
            NOTES="Bug fixes and improvements."
          fi

          printf '%s\n' "$NOTES" > "$NOTES_FILE"
          echo "notes_file=$NOTES_FILE" >> "$GITHUB_OUTPUT"

          ASC_NOTES=$(printf '%s\n' "$NOTES" | head -c 3900)
          printf '%s' "$ASC_NOTES" > "$ASC_NOTES_FILE"
          echo "asc_notes_file=$ASC_NOTES_FILE" >> "$GITHUB_OUTPUT"

      - name: Configure asc CLI
        env:
          ASC_KEY_ID_SECRET: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID_SECRET: ${{ secrets.ASC_ISSUER_ID }}
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
        run: |
          ASC_KEY_DIR="$RUNNER_TEMP/.asc-keys"
          mkdir -p "$ASC_KEY_DIR"
          chmod 700 "$ASC_KEY_DIR"
          ASC_KEY_PATH="$ASC_KEY_DIR/AuthKey_${ASC_KEY_ID_SECRET}.p8"
          echo "$ASC_API_KEY_P8" | base64 --decode > "$ASC_KEY_PATH"
          chmod 600 "$ASC_KEY_PATH"
          {
            echo "ASC_KEY_ID=$ASC_KEY_ID_SECRET"
            echo "ASC_ISSUER_ID=$ASC_ISSUER_ID_SECRET"
            echo "ASC_PRIVATE_KEY_PATH=$ASC_KEY_PATH"
            echo "ASC_BYPASS_KEYCHAIN=1"
          } >> "$GITHUB_ENV"

      - name: Upload .ipa to App Store Connect
        id: asc_upload
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          VERSION="${{ steps.version.outputs.marketing_version }}"
          BUILD_NUMBER="${{ steps.version.outputs.build_number }}"

          find_build() {
            asc builds list \
              --app "$ASC_APP_ID" \
              --platform IOS \
              --version "$VERSION" \
              --build-number "$BUILD_NUMBER" \
              --limit 1 \
              --output json
          }

          BUILD_JSON=$(find_build || true)
          BUILD_ID=$(printf '%s' "$BUILD_JSON" | python3 -c '
          import json, sys
          try:
              data = json.load(sys.stdin)
          except Exception:
              print("")
              raise SystemExit
          items = data.get("data", []) if isinstance(data, dict) else []
          print(items[0].get("id", "") if items else "")
          ')
          PROCESSING_STATE=$(printf '%s' "$BUILD_JSON" | python3 -c '
          import json, sys
          try:
              data = json.load(sys.stdin)
          except Exception:
              print("")
              raise SystemExit
          items = data.get("data", []) if isinstance(data, dict) else []
          print(items[0].get("attributes", {}).get("processingState", "") if items else "")
          ')

          if [[ -n "$BUILD_ID" ]]; then
            echo "Found existing ASC build $BUILD_ID ($PROCESSING_STATE) for $VERSION/$BUILD_NUMBER; skipping upload."
          else
            UPLOAD_JSON=$(asc builds upload \
              --app "$ASC_APP_ID" \
              --ipa "${{ steps.ipa.outputs.ipa_path }}" \
              --version "$VERSION" \
              --build-number "$BUILD_NUMBER")
            echo "$UPLOAD_JSON"
            BUILD_ID=$(printf '%s' "$UPLOAD_JSON" | python3 -c 'import sys, json; print(json.loads(sys.stdin.read().splitlines()[-1])["uploadId"])')
            PROCESSING_STATE=""
          fi

          if [[ -z "$BUILD_ID" ]]; then
            echo "::error::Could not determine App Store Connect build ID for $VERSION/$BUILD_NUMBER"
            exit 1
          fi

          if [[ "$PROCESSING_STATE" != "VALID" ]]; then
            WAIT_ERR="$RUNNER_TEMP/asc-build-wait.err"
            for attempt in {1..20}; do
              echo "Waiting for ASC build $BUILD_ID to finish processing (attempt $attempt)..."
              if asc builds wait --build-id "$BUILD_ID" --timeout 45m --poll-interval 30s 2>"$WAIT_ERR"; then
                break
              fi
              cat "$WAIT_ERR"
              if ! grep -qi "specified resource does not exist" "$WAIT_ERR"; then
                exit 1
              fi
              if [[ "$attempt" -eq 20 ]]; then
                echo "::error::ASC build $BUILD_ID did not become available for processing wait."
                exit 1
              fi
              sleep 30
            done
          fi

          echo "build_id=$BUILD_ID" >> "$GITHUB_OUTPUT"
          asc builds update --build-id "$BUILD_ID" --uses-non-exempt-encryption=false

      - name: Create ASC version and submit for review
        if: ${{ github.event.inputs.dry_run != 'true' && github.event.inputs.skip_asc_submit != 'true' }}
        run: |
          PREV_VERSION=$(asc versions list --app "$ASC_APP_ID" --platform IOS --limit 5 --output json \
            | python3 -c '
          import sys, json
          data = json.load(sys.stdin)
          items = data.get("data", data) if isinstance(data, dict) else data
          target = "${{ steps.version.outputs.marketing_version }}"
          for v in items:
              vs = v.get("attributes", {}).get("versionString")
              if vs and vs != target:
                  print(vs)
                  break
          ')
          if [[ -z "$PREV_VERSION" ]]; then
            echo "::error::Could not determine previous iOS version to copy metadata from"
            exit 1
          fi
          echo "Copying metadata from previous version $PREV_VERSION"

          VERSION_JSON=$(asc versions create \
            --app "$ASC_APP_ID" \
            --version "${{ steps.version.outputs.marketing_version }}" \
            --platform IOS \
            --copy-metadata-from "$PREV_VERSION" \
            --copy-fields "description,keywords,marketingUrl,promotionalText,supportUrl")
          VERSION_ID=$(printf '%s' "$VERSION_JSON" | python3 -c 'import sys, json; print(json.load(sys.stdin)["id"])')
          echo "Created version $VERSION_ID"

          asc versions attach-build \
            --version-id "$VERSION_ID" \
            --build "${{ steps.asc_upload.outputs.build_id }}"

          WHATS_NEW=$(cat "${{ steps.notes.outputs.asc_notes_file }}")
          LOCALES=$(asc localizations list --version "$VERSION_ID" --output json \
            | python3 -c '
          import sys, json
          data = json.load(sys.stdin)
          items = data.get("data", data) if isinstance(data, dict) else data
          for item in items:
              locale = item.get("attributes", {}).get("locale")
              if locale:
                  print(locale)
          ')
          if [[ -z "$LOCALES" ]]; then
            LOCALES="en-US"
          fi
          while IFS= read -r LOCALE; do
            [[ -z "$LOCALE" ]] && continue
            echo "Updating What's New for $LOCALE"
            asc localizations update \
              --locale "$LOCALE" \
              --version "$VERSION_ID" \
              --whats-new "$WHATS_NEW"
          done <<< "$LOCALES"

          SUBMISSION_JSON=$(asc review submissions-create \
            --app "$ASC_APP_ID" \
            --platform IOS)
          SUBMISSION_ID=$(printf '%s' "$SUBMISSION_JSON" | python3 -c 'import sys, json; print(json.load(sys.stdin)["data"]["id"])')
          echo "Created review submission $SUBMISSION_ID"

          asc review items-add \
            --submission "$SUBMISSION_ID" \
            --item-type appStoreVersions \
            --item-id "$VERSION_ID"

          asc review submissions-submit \
            --id "$SUBMISSION_ID" \
            --confirm

      - name: Ensure GitHub release record exists
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          NOTES_FILE="${{ steps.notes.outputs.notes_file }}"

          # On release-triggered runs this release already exists and remains published.
          # iOS doesn't attach an asset (the .ipa lives in ASC). The fallback keeps
          # older tag/manual paths safe if they are reintroduced later.
          if gh release view "$TAG" &>/dev/null; then
            echo "Release $TAG already exists; leaving alone (notes already set, possibly with macOS zip attached)"
          else
            echo "Creating draft release $TAG (fallback iOS-only path)"
            gh release create "$TAG" \
              --draft \
              --title "$TAG" \
              --notes-file "$NOTES_FILE"
          fi

      - name: Cleanup keychain
        if: always()
        run: |
          if [[ -n "$KEYCHAIN_PATH" ]]; then
            security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          fi

      - name: Summary
        if: always()
        run: |
          {
            echo "## Submit iOS ${{ steps.meta.outputs.tag }}"
            echo ""
            echo "- **Version:** ${{ steps.version.outputs.marketing_version }} (build ${{ steps.version.outputs.build_number }})"
            echo "- **Trigger:** ${{ steps.meta.outputs.trigger }}"
            echo "- **Dry run:** ${{ github.event.inputs.dry_run || 'false' }}"
            echo "- **Skip ASC submit:** ${{ github.event.inputs.skip_asc_submit || 'false' }}"
            echo ""
            echo "### Next steps"
            echo "Once ASC review approves the iOS submission, the ASC webhook will fire announce.yml,"
            echo "which posts to Discord (and promotes a draft only for legacy tag-push runs; iOS skips isolated.tech)."
            echo ""
            echo "### Links"
            echo "- [App Store Connect](https://appstoreconnect.apple.com/apps/$ASC_APP_ID/appstore)"
            echo "- [GitHub Release](https://github.com/${{ github.repository }}/releases/tag/${{ steps.meta.outputs.tag }})"
          } >> "$GITHUB_STEP_SUMMARY"
